<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="BWA hochladen und automatisch professionelle Finanzreports generieren – powered by KI. Perfekt für Steuerberater, Buchhalter & Unternehmer." />
    <meta name="keywords" content="BWA auswerten, Finanzreport erstellen, BWA Analyse, Betriebswirtschaftliche Auswertung, KI Finanzreport" />
    <title>BWA-Generator – KI-gestützte Finanzreports in Sekunden</title>

    <!-- Google Analytics mit Consent Mode -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WKGP3FGXLB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      
      // Standard: Analytics deaktiviert bis Zustimmung
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        wait_for_update: 500
      });

      gtag('js', new Date());
      gtag('config', 'G-WKGP3FGXLB');

      // Falls bereits Zustimmung vorhanden
      const consent = JSON.parse(localStorage.getItem('cookie_consent') || 'null');
      if (consent && consent.analytics) {
        gtag('consent', 'update', { analytics_storage: 'granted' });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
